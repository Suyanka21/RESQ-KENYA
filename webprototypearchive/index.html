<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResQ - Emergency Roadside & Medical Response</title>
    
    <!-- Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              // Primary Palette
              charcoal: {
                900: '#0F0F0F', // Primary Black
                800: '#1A1A1A', // Secondary Black
                700: '#252525', // Elevated Surface
                600: '#2E2E2E', // Divider
              },
              voltage: {
                DEFAULT: '#FFD60A', // Primary Voltage
                bright: '#FFF455',  // Highlights
                deep: '#E6B800',    // Pressed
                glow: 'rgba(255, 214, 10, 0.3)',
              },
              // Semantic
              success: '#00E676',
              warning: '#FF9800',
              error: '#FF3D3D',
              info: '#29B6F6',
              // Neutrals
              subtle: '#6B6B6B',
              text: {
                main: '#FFFFFF',
                secondary: '#A0A0A0',
              }
            },
            backgroundImage: {
              'voltage-gradient': 'linear-gradient(45deg, #FFD60A 0%, #FFA800 100%)',
              'dark-gradient': 'linear-gradient(180deg, #0F0F0F 0%, #1A1A1A 100%)',
              'energy-sweep': 'linear-gradient(90deg, transparent, rgba(255, 214, 10, 0.3), transparent)',
            },
            animation: {
              'voltage-pulse': 'voltagePulse 2s ease-in-out infinite',
              'fade-rise': 'fadeRise 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards',
            },
            keyframes: {
              voltagePulse: {
                '0%, 100%': { boxShadow: '0 0 10px rgba(255, 214, 10, 0.3)' },
                '50%': { boxShadow: '0 0 30px rgba(255, 214, 10, 0.6), 0 0 60px rgba(255, 214, 10, 0.3)' },
              },
              fadeRise: {
                'from': { opacity: '0', transform: 'translateY(20px)' },
                'to': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0F0F0F;
        color: #FFFFFF;
      }
      /* Custom scrollbar for dark theme */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0F0F0F;
      }
      ::-webkit-scrollbar-thumb {
        background: #2E2E2E;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #FFD60A;
      }
      
      .voltage-text-shadow {
        text-shadow: 
          0 0 10px rgba(255, 214, 10, 0.5),
          0 0 20px rgba(255, 214, 10, 0.3),
          0 0 30px rgba(255, 214, 10, 0.1);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
